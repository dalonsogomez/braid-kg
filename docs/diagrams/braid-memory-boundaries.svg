<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Braid memory boundaries</title>
  <desc id="desc">Project-local and global Braid memory are separated by directory boundary and dataset identifier.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <style>
      .label { font: 700 26px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; }
      .body { font: 18px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .mono { font: 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .small { font: 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #4b5563; }
      .card { rx: 18; ry: 18; stroke-width: 2.5; }
    </style>
  </defs>

  <rect width="1120" height="520" fill="#ffffff"/>
  <text x="56" y="58" class="label">Braid keeps memory scoped to the nearest real project</text>
  <text x="56" y="90" class="body">A parent may be a Braid project, but a child project wins when your cwd is inside the child.</text>

  <rect x="56" y="138" width="288" height="190" class="card" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="84" y="178" class="label" fill="#134e4a">$HOME</text>
  <text x="84" y="216" class="mono">~/.braid/profile/</text>
  <text x="84" y="252" class="body">Global personal memory</text>
  <text x="84" y="282" class="small">Stable preferences and cross-project defaults.</text>
  <text x="84" y="306" class="small">Fallback only; not mixed by default.</text>

  <rect x="416" y="138" width="288" height="190" class="card" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="444" y="178" class="label" fill="#1e3a8a">Parent directory</text>
  <text x="444" y="216" class="mono">~/Developer/.braid/</text>
  <text x="444" y="252" class="body">Valid when cwd is parent</text>
  <text x="444" y="282" class="small">Can have its own dataset and memory.</text>
  <text x="444" y="306" class="small">Does not override child projects.</text>

  <rect x="776" y="138" width="288" height="190" class="card" fill="#ffedd5" stroke="#7c2d12"/>
  <text x="804" y="178" class="label" fill="#7c2d12">Child project</text>
  <text x="804" y="216" class="mono">&lt;project&gt;/.braid/</text>
  <text x="804" y="252" class="body">Nearest boundary wins</text>
  <text x="804" y="282" class="small">Markers: .git, pyproject.toml,</text>
  <text x="804" y="306" class="small">README.md, Dockerfile, go.mod, etc.</text>

  <path d="M 344 232 C 372 232, 388 232, 416 232" fill="none" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 704 232 C 732 232, 748 232, 776 232" fill="none" stroke="#374151" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="364" y="210" class="small">fallback after project miss</text>
  <text x="714" y="210" class="small">child boundary wins</text>

  <rect x="238" y="382" width="644" height="86" class="card" fill="#ede9fe" stroke="#4c1d95"/>
  <text x="270" y="418" class="label" fill="#4c1d95">Shared backend: ~/.braid/cognee/</text>
  <text x="270" y="450" class="body">Storage can be shared, but every scope is isolated by dataset_id.</text>
</svg>
