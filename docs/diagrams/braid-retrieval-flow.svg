<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Braid retrieval flow</title>
  <desc id="desc">Braid keeps repository inputs, project state, retrieval surfaces, and agent outputs separate and measurable.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 19px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .label { font: 700 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .mono { font: 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .small { font: 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .card { rx: 16; ry: 16; stroke-width: 2.5; }
      .soft { stroke-width: 2; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="64" y="58" class="title"><tspan x="64" >Retrieval keeps sources separate and measurable</tspan></text>
  <text x="64" y="94" class="subtitle"><tspan x="64" >Code, docs, ADRs, FTS, vectors, graph traversal, and global fallback remain inspectable.</tspan><tspan x="64" dy="1.45em">Architecture changes should be driven by braid eval results.</tspan></text>

  <rect x="56" y="158" width="250" height="145" class="card" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="92" y="205" class="label" fill="#1e3a8a"><tspan x="92" >Inputs</tspan></text>
  <text x="92" y="242" class="small"><tspan x="92" >Repository files</tspan><tspan x="92" dy="1.45em">Docs and ADRs</tspan></text>

  <path d="M 306 230 L 365 230" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="365" y="158" width="250" height="145" class="card" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="401" y="205" class="label" fill="#134e4a"><tspan x="401" >Index</tspan></text>
  <text x="401" y="242" class="mono"><tspan x="401" >braid index</tspan></text>
  <text x="401" y="274" class="small"><tspan x="401" >Cognee + DuckLake</tspan></text>

  <path d="M 615 230 L 674 230" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="674" y="158" width="250" height="145" class="card" fill="#ede9fe" stroke="#4c1d95"/>
  <text x="710" y="205" class="label" fill="#4c1d95"><tspan x="710" >Project state</tspan></text>
  <text x="710" y="242" class="mono"><tspan x="710" >.braid/kg/</tspan><tspan x="710" dy="1.45em">.braid/rag/</tspan></text>
  <text x="710" y="286" class="small"><tspan x="710" >Memory, graph, indexes</tspan></text>

  <path d="M 924 230 L 983 230" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="983" y="158" width="240" height="145" class="card" fill="#ffedd5" stroke="#7c2d12"/>
  <text x="1017" y="205" class="label" fill="#7c2d12"><tspan x="1017" >MCP + CLI</tspan></text>
  <text x="1017" y="242" class="small"><tspan x="1017" >braid_search</tspan><tspan x="1017" dy="1.45em">ask, status, eval</tspan></text>

  <rect x="72" y="410" width="240" height="156" class="card" fill="#f8fafc" stroke="#64748b"/>
  <text x="104" y="452" class="label" fill="#334155"><tspan x="104" >FTS</tspan></text>
  <text x="104" y="488" class="small"><tspan x="104" >BM25 mirror tables</tspan><tspan x="104" dy="1.45em">Fast lexical grounding</tspan></text>

  <rect x="371" y="410" width="240" height="156" class="card" fill="#f8fafc" stroke="#64748b"/>
  <text x="403" y="452" class="label" fill="#334155"><tspan x="403" >Vectors</tspan></text>
  <text x="403" y="488" class="small"><tspan x="403" >Optional LanceDB</tspan><tspan x="403" dy="1.45em">Semantic recall</tspan></text>

  <rect x="670" y="410" width="240" height="156" class="card" fill="#f8fafc" stroke="#64748b"/>
  <text x="702" y="452" class="label" fill="#334155"><tspan x="702" >Graph</tspan></text>
  <text x="702" y="488" class="small"><tspan x="702" >DuckDB joins</tspan><tspan x="702" dy="1.45em">Impact and neighbors</tspan></text>

  <rect x="969" y="410" width="240" height="156" class="card" fill="#f8fafc" stroke="#64748b"/>
  <text x="1001" y="452" class="label" fill="#334155"><tspan x="1001" >Fallback</tspan></text>
  <text x="1001" y="488" class="small"><tspan x="1001" >$HOME/.braid/profile</tspan><tspan x="1001" dy="1.45em">Only after local miss</tspan></text>

  <path d="M 799 303 L 192 410" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 799 303 L 491 410" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 799 303 L 790 410" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M 799 303 L 1089 410" fill="none" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="326" y="630" width="628" height="48" rx="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="366" y="662" class="body"><tspan x="366" >Each surface can be measured independently before changing retrieval architecture.</tspan></text>
</svg>
