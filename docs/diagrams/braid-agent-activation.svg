<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Braid agent activation</title>
  <desc id="desc">braid agent-init configures Claude, Codex, Cursor, and Copilot without indexing, LLM calls, or memory promotion.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
    <style>
      .title { font: 700 34px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .subtitle { font: 19px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .label { font: 700 24px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; }
      .body { font: 17px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #334155; }
      .mono { font: 17px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #111827; }
      .small { font: 15px ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; }
      .card { rx: 16; ry: 16; stroke-width: 2.5; }
      .soft { stroke-width: 2; }
    </style>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="64" y="58" class="title"><tspan x="64" >One command activates Braid across supported agents</tspan></text>
  <text x="64" y="94" class="subtitle"><tspan x="64" >It checks, fixes, or removes only Braid-managed config.</tspan><tspan x="64" dy="1.45em">It never indexes, calls an LLM, or promotes memory.</tspan></text>

  <rect x="390" y="145" width="500" height="118" class="card" fill="#dbeafe" stroke="#1d4ed8"/>
  <text x="432" y="190" class="label" fill="#1e3a8a"><tspan x="432" >braid agent-init</tspan></text>
  <text x="432" y="228" class="mono"><tspan x="432" >--check | --fix</tspan><tspan x="432" dy="1.45em">--remove | --json</tspan></text>

  <path d="M 640 263 L 640 300" fill="none" stroke="#334155" stroke-width="2.5"/>
  <path d="M 200 300 L 1080 300" fill="none" stroke="#334155" stroke-width="2.5"/>
  <path d="M 200 300 L 200 332" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 493 300 L 493 332" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 786 300 L 786 332" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>
  <path d="M 1080 300 L 1080 332" fill="none" stroke="#334155" stroke-width="2.5" marker-end="url(#arrow)"/>

  <rect x="78" y="340" width="244" height="172" class="card" fill="#ffedd5" stroke="#7c2d12"/>
  <text x="110" y="382" class="label" fill="#7c2d12"><tspan x="110" >Claude</tspan></text>
  <text x="110" y="418" class="mono"><tspan x="110" >.claude/</tspan><tspan x="110" dy="1.45em">settings.json</tspan></text>
  <text x="110" y="464" class="small"><tspan x="110" >SessionStart hook</tspan><tspan x="110" dy="1.45em">MCP server: braid</tspan></text>

  <rect x="371" y="340" width="244" height="172" class="card" fill="#ccfbf1" stroke="#0f766e"/>
  <text x="403" y="382" class="label" fill="#134e4a"><tspan x="403" >Codex</tspan></text>
  <text x="403" y="418" class="mono"><tspan x="403" >.codex/</tspan><tspan x="403" dy="1.45em">hooks.json</tspan></text>
  <text x="403" y="464" class="small"><tspan x="403" >Session hook command</tspan><tspan x="403" dy="1.45em">braid claude-session-start</tspan></text>

  <rect x="664" y="340" width="244" height="172" class="card" fill="#ede9fe" stroke="#4c1d95"/>
  <text x="696" y="382" class="label" fill="#4c1d95"><tspan x="696" >Cursor</tspan></text>
  <text x="696" y="418" class="mono"><tspan x="696" >.cursor/rules/</tspan><tspan x="696" dy="1.45em">main.mdc</tspan></text>
  <text x="696" y="464" class="small"><tspan x="696" >Symlink to AGENTS.md</tspan><tspan x="696" dy="1.45em">Root discovery stays root</tspan></text>

  <rect x="957" y="340" width="244" height="172" class="card" fill="#fef3c7" stroke="#854d0e"/>
  <text x="989" y="382" class="label" fill="#713f12"><tspan x="989" >Copilot</tspan></text>
  <text x="989" y="418" class="mono"><tspan x="989" >.github/copilot-</tspan><tspan x="989" dy="1.45em">instructions.md</tspan></text>
  <text x="989" y="464" class="small"><tspan x="989" >Symlink to AGENTS.md</tspan><tspan x="989" dy="1.45em">Preserves other config</tspan></text>

  <rect x="286" y="592" width="708" height="58" rx="29" fill="#f8fafc" stroke="#94a3b8" stroke-width="2"/>
  <text x="326" y="628" class="body"><tspan x="326" >Only managed blocks change; unrelated hooks and settings are preserved.</tspan></text>
</svg>
